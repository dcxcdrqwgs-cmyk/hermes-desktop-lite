name: stage1-packages

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-universal
            runs-on: macos-latest
            command: npm run build:mac:universal
            artifact_name: hermes-desktop-lite-macos-universal
            artifact_path: |
              src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
              src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app
          - name: linux-x64-deb
            runs-on: ubuntu-22.04
            command: npm run build:linux:x64:deb
            artifact_name: hermes-desktop-lite-linux-x64-deb
            artifact_path: src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
          - name: linux-arm64-deb
            runs-on: ubuntu-22.04-arm
            command: npm run build:linux:arm64:deb
            artifact_name: hermes-desktop-lite-linux-arm64-deb
            artifact_path: src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/deb/*.deb

    runs-on: ${{ matrix.runs-on }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build package
        env:
          CI: "true"
        run: ${{ matrix.command }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
